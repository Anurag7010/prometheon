version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ai_product_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  ai-backend:
    build:
      context: ./ai-backend
    ports:
      - "8000:8000"
    env_file:
      - ./ai-backend/.env
    environment:
      - ENVIRONMENT=development
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - chromadata:/app/chroma_db
      - ./ai-backend/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  chromadata:
